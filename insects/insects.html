<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digibooks — Wolfsonian</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #111;
    --paper: #f0f0f0;
    --mid: #777;
    --page-w: 640px;
    --page-h: 461px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--ink);
    font-family: 'Source Sans 3', 'Aptos', 'Calibri', 'Segoe UI', Arial, sans-serif;
    color: var(--paper);
    overflow: hidden;
    user-select: none;
  }

  body::after {
    content: '';
    position: fixed; inset: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none; z-index: 9998;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 36px 14px;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(17,17,17,0.97) 70%, transparent);
  }
  
  .wordmark {
    font-weight: 600; font-size: 14px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--paper);
  }
  
  .page-counter {
    font-size: 11px; letter-spacing: 0.18em;
    color: var(--mid); text-transform: uppercase; font-weight: 300;
  }
  
  .page-counter span { color: var(--paper); font-weight: 600; }

  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    perspective: 2200px;
  }

  #book {
    position: relative;
    width: calc(var(--page-w) * 2);
    height: var(--page-h);
    transform-style: preserve-3d;
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.85));
    flex-shrink: 0;
  }

  #spine {
    position: absolute; top: 0; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 8px;
    background: linear-gradient(to right, #000, #2a2a2a, #000);
    z-index: 50;
    box-shadow: 0 0 18px rgba(0,0,0,0.9);
  }

  .page {
    position: absolute; top: 0;
    width: var(--page-w); height: var(--page-h);
    transform-style: preserve-3d;
    transform-origin: left center;
    transition: transform 0.72s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    cursor: pointer;
    will-change: transform;
  }
  .page.right-side { right: 0; transform-origin: right center; }

  .page-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    transform: translateZ(0); /* Hardware Acceleration */
  }
  .page-front { background: #fff; }
  .page-back  { background: #fff; transform: rotateY(180deg); }
  
  .page-face img { 
    width: 100%; height: 100%; 
    object-fit: contain; display: block; 
    pointer-events: none; background: #fff;
    image-rendering: -webkit-optimize-contrast;
  }

  .page-face::after { content: ''; position: absolute; inset: 0; pointer-events: none; }
  .page-front::after { background: linear-gradient(to right, rgba(0,0,0,0.1) 0%, transparent 22%); }
  .page-back::after  { background: linear-gradient(to left,  rgba(0,0,0,0.1) 0%, transparent 22%); }

  #left-panel, #right-panel {
    position: absolute; top: 0;
    width: var(--page-w); height: var(--page-h);
    overflow: hidden;
    transform: translateZ(0);
  }
  #left-panel { left: 0; }
  #right-panel { right: 0; }
  #left-panel img, #right-panel img { width: 100%; height: 100%; object-fit: contain; display: block; background: #fff; }

  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 20px; padding: 22px 36px 28px;
    background: linear-gradient(to top, rgba(17,17,17,0.97) 60%, transparent);
    z-index: 100;
  }
  .nav-btn {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent; color: var(--paper);
    cursor: pointer; transition: all 0.2s; font-size: 16px;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
  .nav-btn:disabled { opacity: 0.15; cursor: default; }

  #progress-track {
    position: relative; width: 280px; height: 1px;
    background: rgba(255,255,255,0.15); cursor: pointer;
  }
  #progress-fill { height: 100%; background: var(--paper); transition: width 0.4s ease; }
  #progress-thumb {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 8px; height: 8px; background: var(--paper);
    border-radius: 50%; transition: left 0.4s ease; pointer-events: none;
  }

  #cover-page {
    position: absolute; inset: 0; background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    transition: opacity 0.8s ease, pointer-events 0s 0.8s;
  }
  #cover-page.hidden { opacity: 0; pointer-events: none; }
  .cover-inner { text-align: center; }
  .cover-title {
    font-size: 56px; font-weight: 300; letter-spacing: 0.12em;
    line-height: 1.05; color: var(--paper);
    margin-bottom: 10px; text-transform: uppercase;
  }

  #thumb-strip {
    position: fixed; left: 28px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 4px;
    z-index: 90; max-height: 70vh; overflow-y: auto; scrollbar-width: none;
  }
  .thumb {
    width: 36px; height: 26px; overflow: hidden; cursor: pointer;
    border: 1px solid transparent; transition: all 0.2s; opacity: 0.3; flex-shrink: 0;
  }
  .thumb.active { opacity: 1; border-color: rgba(255,255,255,0.65); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  
  .home-btn, .fs-btn {
    background: transparent; border: 1px solid rgba(255,255,255,0.2);
    color: var(--mid); cursor: pointer; padding: 6px 14px; font-size: 10px; text-transform: uppercase;
  }
  .home-btn:hover, .fs-btn:hover { background: rgba(255,255,255,0.1); color: var(--paper); }
  
  .open-btn {
    display: inline-block; padding: 11px 34px;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--paper); background: transparent;
    font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
    cursor: pointer; transition: all 0.25s;
  }
  .open-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }
</style>
</head>
<body>

<div id="cover-page">
  <div class="cover-inner">
    <div class="cover-title" style="font-size: 46px;">Insectes</div>
    <div style="font-size:14px; font-weight:300; letter-spacing:0.25em; color:var(--mid); text-transform:uppercase;">
      c. 1925
    </div>
    <div class="loading-text">Loading Archive...</div>
  </div>
</div>

<header>
  <div class="wordmark">Wolfsonian</div>
  <div class="page-counter">Page <span id="cur-page">1</span> of <span id="tot-pages">24</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="fs-btn" onclick="toggleFullscreen()">FS</button>
    <button class="home-btn" onclick="goHome()">Home</button>
  </div>
</header>

<div id="thumb-strip"></div>

<div id="stage">
  <div id="book">
    <div id="spine"></div>
    <div id="left-panel"><img id="left-img" src="" alt=""></div>
    <div id="right-panel"><img id="right-img" src="" alt=""></div>
  </div>
</div>

<div id="controls">
  <button class="nav-btn" onclick="goToPage(0)">&#10073;&#9664;</button>
  <button class="nav-btn" id="btn-prev" onclick="turnPage(-1)">&#9664;</button>
  <div id="progress-track" onclick="scrubTo(event)">
    <div id="progress-fill"></div>
    <div id="progress-thumb"></div>
  </div>
  <button class="nav-btn" id="btn-next" onclick="turnPage(1)">&#9654;</button>
  <button class="nav-btn" onclick="goToPage(TOTAL_SPREADS-1)">&#9654;&#10073;</button>
</div>

<script>
// ─── Config ────────────────────────────────────────────────────
const TOTAL_IMAGES  = 24;
const TOTAL_SPREADS = Math.floor(TOTAL_IMAGES / 2) + 1;
const IMG_DIR = 'pages/';
const IMG_EXT = '.webp'; // Now pointing to your new optimized WebP files

// ─── State ─────────────────────────────────────────────────────
let current = 0, isAnimating = false;
let PAGE_ASPECT = 680 / 490;
const loadedImages = new Set(); 

// ─── Element refs ──────────────────────────────────────────────
const book = document.getElementById('book'), 
      leftImg = document.getElementById('left-img'), 
      rightImg = document.getElementById('right-img'),
      curEl = document.getElementById('cur-page'), 
      fillEl = document.getElementById('progress-fill'), 
      thumbEl = document.getElementById('progress-thumb'), 
      thumbStrip = document.getElementById('thumb-strip');

function imgSrc(n) { return n ? IMG_DIR + n + IMG_EXT : ''; }

// ─── Lazy Load & Preload Engine ────────────────────────────────
function smartLoad(n) {
  if (!n || loadedImages.has(n)) return;
  const img = new Image();
  img.src = imgSrc(n);
  loadedImages.add(n);
}

function manageAssets(s) {
  const currentSp = getSpread(s);
  const nextSp    = (s + 1 < TOTAL_SPREADS) ? getSpread(s + 1) : null;
  const prevSp    = (s - 1 >= 0) ? getSpread(s - 1) : null;

  if (currentSp.left)  smartLoad(currentSp.left);
  if (currentSp.right) smartLoad(currentSp.right);

  if (nextSp) {
    if (nextSp.left)  smartLoad(nextSp.left);
    if (nextSp.right) smartLoad(nextSp.right);
  }
  if (prevSp) {
    if (prevSp.left)  smartLoad(prevSp.left);
    if (prevSp.right) smartLoad(prevSp.right);
  }
}

function getSpread(s) {
  if (s === 0) return { left: null, right: 1 };
  if (s === TOTAL_SPREADS - 1) return { left: TOTAL_IMAGES, right: null };
  return { left: s * 2, right: s * 2 + 1 };
}

function renderSpread(s) {
  const sp = getSpread(s);
  
  if (sp.left)  { leftImg.src = imgSrc(sp.left);  document.getElementById('left-panel').style.visibility = 'visible'; }
  else          { leftImg.src = '';               document.getElementById('left-panel').style.visibility = 'hidden'; }
  
  if (sp.right) { rightImg.src = imgSrc(sp.right); document.getElementById('right-panel').style.visibility = 'visible'; }
  else          { rightImg.src = '';               document.getElementById('right-panel').style.visibility = 'hidden'; }

  curEl.textContent = s === 0 ? 'Cover' : s === TOTAL_SPREADS - 1 ? 'Back' : `${sp.left}–${sp.right}`;
  
  const pct = (s / (TOTAL_SPREADS - 1)) * 100;
  fillEl.style.width = pct + '%'; 
  thumbEl.style.left = pct + '%';

  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === s));
  
  manageAssets(s);
}

function turnPage(dir) {
  if (isAnimating) return;
  const next = current + dir;
  if (next < 0 || next >= TOTAL_SPREADS) return;
  isAnimating = true;

  const curSp = getSpread(current), nextSp = getSpread(next);
  const page = document.createElement('div');
  page.className = 'page';
  
  const front = document.createElement('div'); front.className = 'page-face page-front';
  const back = document.createElement('div');  back.className  = 'page-face page-back';
  const fi = document.createElement('img'), bi = document.createElement('img');

  if (dir > 0) {
    fi.src = imgSrc(curSp.right);
    bi.src = imgSrc(nextSp.left);
    page.style.right = '0'; 
    page.style.transformOrigin = 'left center';
  } else {
    fi.src = imgSrc(curSp.left);
    bi.src = imgSrc(nextSp.right);
    page.style.left = '0'; 
    page.style.transformOrigin = 'right center';
  }

  front.appendChild(fi); back.appendChild(bi);
  page.appendChild(front); page.appendChild(back);
  book.appendChild(page);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      page.style.transform = dir > 0 ? 'rotateY(-180deg)' : 'rotateY(180deg)';
    });
  });

  page.addEventListener('transitionend', () => {
    current = next; 
    renderSpread(current);
    book.removeChild(page); 
    isAnimating = false;
  }, { once: true });
}

function resizeBook() {
  const availW = window.innerWidth - 140, availH = window.innerHeight - 170;
  let pageW = Math.min(680, Math.floor(availW / 2)), pageH = Math.round(pageW / PAGE_ASPECT);
  if (pageH > availH) { pageH = Math.min(490, availH); pageW = Math.round(pageH * PAGE_ASPECT); }
  document.documentElement.style.setProperty('--page-w', pageW + 'px');
  document.documentElement.style.setProperty('--page-h', pageH + 'px');
}

function openBook() { document.getElementById('cover-page').classList.add('hidden'); renderSpread(0); }

// Points back out of the insects folder to the shelf
function goHome() { location.href = '../index.html'; } 

function goToPage(s) { if (!isAnimating && s !== current) { current = s; renderSpread(s); } }
function scrubTo(e) { const pct = Math.max(0, Math.min(1, (e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth)); goToPage(Math.round(pct * (TOTAL_SPREADS - 1))); }

function buildThumbs() {
  for (let s = 0; s < TOTAL_SPREADS; s++) {
    const sp = getSpread(s), d = document.createElement('div');
    d.className = 'thumb'; 
    d.innerHTML = `<img src="${imgSrc(sp.right || sp.left)}" loading="lazy">`;
    d.onclick = () => goToPage(s); 
    thumbStrip.appendChild(d);
  }
}

function detectAspectAndInit() {
  const probe = new Image();
  probe.onload = () => { if (probe.naturalWidth) PAGE_ASPECT = probe.naturalWidth / probe.naturalHeight; init(); };
  probe.onerror = init;
  probe.src = imgSrc(1);
}

function init() {
  resizeBook(); 
  window.addEventListener('resize', resizeBook);
  buildThumbs(); 
  document.getElementById('tot-pages').textContent = TOTAL_IMAGES;
  renderSpread(0);
}

detectAspectAndInit();

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => console.error(e));
  else document.exitFullscreen();
}
</script>
</body>
</html>
